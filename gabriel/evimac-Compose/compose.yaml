name: evimac-compose

services:

  # -----------------------------------------------------
  # PostgreSQL
  # -----------------------------------------------------
  postgres:
    image: postgres:18
    container_name: evimac_postgres
    environment:
     POSTGRES_DB: ${POSTGRES_DB}
     POSTGRES_USER: ${POSTGRES_USER}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./postgres/backup:/backup
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d keycloak"]

      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - evimac-network

  # -----------------------------------------------------
  # Keycloak
  # -----------------------------------------------------
  keycloak:
    image: evidanza-keycloak:latest
    container_name: evimac_keycloak
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      EVI_REDIRECT_URL: ${EVI_REDIRECT_URL}
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evimac-network

  # -----------------------------------------------------
  # eviMaC
  # -----------------------------------------------------
  evimac:
    image: evimac:latest
    container_name: eviMaC
    volumes:
      - ./evimac/files:/app/configfolder
      - ../JavascriptClient/Frontend/Thin/Client_TS:/app/JavascriptClient/Frontend/Thin/Client_TS
      - ../JavascriptClient/dist:/app/JavascriptClient/dist
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - evimac-network

volumes:
  pgdata:

networks:
  evimac-network:
